<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - YUMMIESS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body class="flex items-center justify-center h-screen overflow-hidden">

  <!-- BLOBS -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <!-- REGISTER CARD -->
  <div class="bg-white rounded-2xl shadow-xl p-8 w-[350px] z-10 relative">

    <h1 class="text-3xl text-center mb-2 gradient-text">
      YUMMIESS...!
    </h1>

    <p class="text-center mb-3">
      🍽 <span class="gradient-text">Join & enjoy delicious food</span> 🍽
    </p>

    <h2 class="text-2xl text-center mb-6 gradient-text">
      Register
    </h2>

    <!-- FORM -->
    <form id="registerForm">

      <!-- Name -->
      <div class="relative mb-4">
        <span class="absolute left-3 top-3 text-gray-400">👤</span>
        <input 
          type="text"
          name="name"
          placeholder="Full Name"
          autocomplete="name"
          class="w-full pl-10 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"
          required
        >
      </div>

      <!-- Email -->
      <div class="relative mb-4">
        <span class="absolute left-3 top-3 text-gray-400">📧</span>
        <input 
          type="email"
          name="email"
          placeholder="Email"
          autocomplete="email"
          class="w-full pl-10 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"
          required
        >
      </div>

      <!-- Password -->
      <div class="relative mb-4">
        <span class="absolute left-3 top-3 text-gray-400">🔐</span>
        <input 
          type="password"
          name="password"
          placeholder="Password"
          autocomplete="new-password"
          class="w-full pl-10 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"
          required
        >
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full py-2 rounded-lg text-white font-semibold 
               bg-gradient-to-r from-red-400 via-orange-400 to-yellow-400 
               shadow-md hover:shadow-xl 
               transform hover:-translate-y-1 hover:scale-105 
               transition duration-300">
        Register
      </button>

    </form>

    <!-- LOGIN LINK -->
    <p class="text-sm text-center mt-4">
      Already have an account? 
      <a href="login.html" class="text-orange-500 font-semibold hover:underline">
        Login
      </a>
    </p>

  </div>

<script src="script.js"></script>

</body>
</html>
