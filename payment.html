<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment - YUMMIESS</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">

  <div class="bg-white p-6 rounded-2xl shadow-md text-center w-80">

    <h2 class="text-xl font-bold mb-4 text-yellow-500 underline">
      Scan & Pay 📲
    </h2>

    <!-- QR IMAGE -->
    <img src="your-qr.jpeg" alt="QR Code" class="w-48 mx-auto mb-4">

    <p class="text-gray-600 mb-4">
      Scan using GPay / PhonePe
    </p>

    <p class="text-lg font-bold mb-4">
      ₹ <span id="finalAmount">0</span>
    </p>

    <!-- BUTTON -->
    <button onclick="confirmPayment()"
      class="w-full py-2 bg-green-500 text-white rounded-lg">
      I Have Paid ✅
    </button>

  </div>

<script src="payment.js"></script>
</body>
</html>
